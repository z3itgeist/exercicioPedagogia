<header> Learning with Sounds</header>
<!--criar 3 divs, colors, forms, numbers cada um para um dos mini-jogos
tem que ficar as 3 lado a lado, e caber numa tela
fundo escuro-->
<div id="colorsGame">
    <!--criar 8 elementos clicáveis que toquem o nome da cor em ingles
    criar os elementos na página, ao clicar chamam cada um uma função-->
    <div id="sumPink">
        <button type="button" id="redButton">Red</button>
        <button type="button" id="whiteButton">White</button>
        <button type="button" id="pinkButton">Pink</button>
    </div>
    <div id="sumPurple">
        <button type="button" id="redButton">Red</button>
        <button type="button" id="blueButton">Blue</button>
        <button type="button" id="purpleButton">Purple</button>
    </div>
    <div id="sumOrange">
       <button type="button" id="redButton">Red</button>
        <button type="button" id="yellowButton">Yellow</button>
        <button type="button" id="orangeButton">Orange</button>
    </div>
    <div id="sumGreen">
        <button type="button" id="blueButton">Blue</button>
        <button type="button" id="yellowButton">Yellow</button>
        <button type="button" id="greenButton">Green</button>
    </div>
</div>

<div id="formsGame"></div>
<div id="numbersGame"></div>
